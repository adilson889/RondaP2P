<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RondaP2P — Minha Loja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&family=Playfair+Display:wght@700;900&family=Space+Grotesk:wght@500;600;700&family=Syne:wght@700;800&family=Bebas+Neue&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
  <style>
    html, body { overflow-y: auto; height: auto; background: var(--bg); }

    .an-wrap { max-width: 480px; margin: 0 auto; padding-bottom: 60px; }

    /* ── LOGIN / CRIAR ── */
    .tela-card {
      padding: 48px 24px 32px;
    }

    .tela-logo {
      text-align: center; margin-bottom: 32px;
    }

    .tela-logo-icon {
      width: 68px; height: 68px; border-radius: 20px;
      background: var(--r); color: #fff;
      font-size: 1.9rem; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      box-shadow: 0 6px 20px rgba(139,0,0,0.3);
    }

    .tela-logo h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: -.3px; }
    .tela-logo p  { color: var(--muted); font-size: .83rem; margin-top: 4px; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: .78rem;
    }
    .divider::before,
    .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .link-criar {
      text-align: center; margin-top: 20px;
      font-size: .83rem; color: var(--muted);
    }
    .link-criar span { color: var(--r); font-weight: 700; cursor: pointer; }

    /* ── PREVIEW MARCA (no criar) ── */
    .marca-preview {
      border-radius: 16px; overflow: hidden;
      margin-bottom: 20px; display: none;
    }

    .marca-preview-hero {
      min-height: 120px; padding: 20px;
      display: flex; align-items: center; gap: 14px;
      position: relative;
    }

    .marca-preview-logo {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 900; color: #fff;
      flex-shrink: 0; font-family: var(--prev-font, 'DM Sans', sans-serif);
    }

    .marca-preview-nome {
      font-size: 1.3rem; color: #fff;
      font-family: var(--prev-font, 'DM Sans', sans-serif);
      font-weight: var(--prev-weight, 800);
      letter-spacing: var(--prev-spacing, -0.5px);
      text-transform: var(--prev-transform, none);
      line-height: 1.1;
    }

    .marca-preview-slogan {
      font-size: .78rem; color: rgba(255,255,255,0.75);
      margin-top: 3px;
      font-style: var(--prev-slogan, normal);
    }

    .marca-preview-tag {
      position: absolute; top: 12px; right: 12px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff; font-size: .65rem; font-weight: 700;
      padding: 3px 8px; border-radius: 99px;
      letter-spacing: .5px; text-transform: uppercase;
    }

    /* ── ESTILOS DE MARCA ── */
    .estilos-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      margin-bottom: 16px;
    }

    .estilo-opt {
      border: 2px solid var(--border);
      border-radius: 10px; padding: 10px 8px;
      text-align: center; cursor: pointer;
      transition: all .15s; background: var(--bg2);
    }

    .estilo-opt:hover { border-color: var(--r); }
    .estilo-opt.sel   { border-color: var(--r); background: var(--r-soft); }

    .estilo-opt-nome {
      font-size: .72rem; font-weight: 700;
      color: var(--text); margin-top: 4px;
    }

    .estilo-opt-amostra {
      font-size: .85rem; color: var(--r); line-height: 1;
    }

    /* ── COR PICKER ── */
    .cor-picker-wrap {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 8px;
    }

    .cor-opt {
      width: 34px; height: 34px; border-radius: 50%;
      cursor: pointer; border: 3px solid transparent;
      transition: border-color .15s, transform .1s;
    }

    .cor-opt:hover { transform: scale(1.1); }
    .cor-opt.seleccionada { border-color: var(--text); }

    .cor-custom {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2px dashed var(--border); padding: 0;
      cursor: pointer; overflow: hidden; background: none;
    }

    /* ── PAINEL HERO ── */
    .painel-hero {
      position: relative; overflow: hidden;
      min-height: 180px;
    }

    .painel-hero-bg {
      position: absolute; inset: 0;
      background: var(--loja-cor, var(--r));
    }

    .painel-hero-bg::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(160deg, transparent 50%, rgba(0,0,0,0.3) 100%);
    }

    .painel-hero-pattern {
      position: absolute; inset: 0;
      opacity: 0.07;
      background-image: var(--loja-pattern);
      background-size: var(--loja-pattern-size, 40px 40px);
    }

    .painel-hero-content {
      position: relative; z-index: 2;
      padding: 20px;
    }

    .painel-hero-top {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    }

    .btn-hero-back {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .2s;
    }

    .btn-hero-back:hover { background: rgba(255,255,255,0.28); }

    .painel-logo {
      width: 48px; height: 48px;
      border-radius: var(--loja-logo-radius, 14px);
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 900; color: #fff;
      font-family: var(--loja-font, 'DM Sans', sans-serif);
      flex-shrink: 0;
    }

    .painel-nome-wrap { flex: 1; min-width: 0; }

    .painel-nome {
      font-family: var(--loja-font, 'DM Sans', sans-serif);
      font-size: 1.15rem; font-weight: var(--loja-nome-weight, 800);
      letter-spacing: var(--loja-nome-spacing, -0.3px);
      text-transform: var(--loja-nome-transform, none);
      color: #fff; line-height: 1.1;
    }

    .painel-plano {
      font-size: .72rem; color: rgba(255,255,255,0.7); margin-top: 2px;
    }

    .painel-stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }

    .painel-stat {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; padding: 10px;
      text-align: center; backdrop-filter: blur(4px);
    }

    .painel-stat-num   { font-size: 1.3rem; font-weight: 900; color: #fff; }
    .painel-stat-label { font-size: .62rem; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }

    /* ── TABS ── */
    .an-tabs {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--bg2); position: sticky; top: 0; z-index: 10;
    }

    .an-tab {
      flex: 1; padding: 13px; border: none;
      background: transparent; color: var(--muted);
      font-size: .85rem; font-weight: 600;
      cursor: pointer; border-bottom: 2px solid transparent;
      font-family: var(--sans); transition: all .15s;
    }

    .an-tab.activo { color: var(--r); border-bottom-color: var(--r); }

    .an-secao { display: none; padding: 16px; }
    .an-secao.activa { display: block; }

    /* ── CARDS ── */
    .an-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; margin-bottom: 14px;
    }

    .an-card-titulo {
      font-size: .7rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px;
      margin-bottom: 14px; display: flex; align-items: center; gap: 7px;
    }

    .an-card-titulo svg { color: var(--r); flex-shrink: 0; }

    /* ── LINK LOJA ── */
    .link-loja {
      background: var(--bg3); border-radius: 10px;
      padding: 12px 14px; display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; border: 1px solid var(--border);
    }

    .link-loja-url {
      flex: 1; font-size: .78rem; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .btn-copiar {
      background: var(--r); color: #fff; border: none;
      padding: 7px 14px; border-radius: 8px;
      font-size: .75rem; font-weight: 700; cursor: pointer;
      flex-shrink: 0; font-family: var(--sans);
      display: flex; align-items: center; gap: 5px;
    }

    /* ── VALIDADE ── */
    .expira-bar {
      height: 5px; background: var(--bg3);
      border-radius: 99px; overflow: hidden; margin-top: 10px;
    }

    .expira-fill {
      height: 100%; border-radius: 99px;
      transition: width .4s;
    }

    /* ── PARTILHAR BTNS ── */
    .share-btns { display: flex; gap: 10px; }
    .share-btns .btn-outline {
      flex: 1; display: flex; align-items: center;
      justify-content: center; gap: 7px;
    }

    /* ── PRODUTO ITEM ── */
    .produto-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }

    .produto-item:last-child { border-bottom: none; }

    .produto-item-icone {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--bg3); display: flex; align-items: center; justify-content: center;
      color: var(--r); flex-shrink: 0;
    }

    .produto-item-info { flex: 1; min-width: 0; }
    .produto-item-nome  { font-weight: 700; font-size: .9rem; }
    .produto-item-preco { font-size: .82rem; color: var(--r); font-weight: 700; margin-top: 2px; }

    .produto-item-acoes { display: flex; gap: 6px; align-items: center; }

    .toggle-disponivel {
      width: 40px; height: 22px; border-radius: 99px;
      background: var(--bg3); border: none; cursor: pointer;
      position: relative; transition: background .2s; flex-shrink: 0;
    }

    .toggle-disponivel.on { background: var(--green); }

    .toggle-disponivel::after {
      content: ''; position: absolute;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; top: 3px; left: 3px; transition: left .2s;
    }

    .toggle-disponivel.on::after { left: 21px; }

    .btn-remover {
      width: 30px; height: 30px; border-radius: 8px;
      border: 1px solid var(--border); background: none;
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }

    .btn-remover:hover { border-color: var(--r); color: var(--r); background: var(--r-soft); }

    /* ── ESTADO BADGE ── */
    .estado-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 99px;
      font-size: .72rem; font-weight: 700;
    }

    .badge-activo   { background: rgba(46,125,50,0.12); color: var(--green); }
    .badge-expirado { background: rgba(139,0,0,0.1); color: var(--r); }

    /* ── TOAST ── */
    #toastAn {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--bg2);
      padding: 10px 20px; border-radius: 99px;
      font-size: .85rem; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: all .3s; z-index: 200; white-space: nowrap;
    }

    #toastAn.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="an-wrap">

  <!-- ── TELA LOGIN ── -->
  <div id="telaLoginAn" class="tela-card">
    <div class="tela-logo">
      <div class="tela-logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <h1>Minha Loja</h1>
      <p>RondaP2P para Negócios</p>
    </div>

    <div class="campo">
      <label>Código da loja</label>
      <input id="anCodigo" type="text" placeholder="Ex: ABC123" style="text-transform:uppercase" onkeydown="if(event.key==='Enter')entrarLoja()">
    </div>
    <div class="campo">
      <label>Telefone (registado)</label>
      <input id="anTelefone" type="tel" placeholder="+244 9XX XXX XXX" onkeydown="if(event.key==='Enter')entrarLoja()">
    </div>
    <button class="btn-primary w100" onclick="entrarLoja()">
      Aceder à loja
    </button>

    <div class="divider">ou</div>

    <div class="link-criar">
      Não tens loja? <span onclick="mostrarCriarLoja()">Criar agora →</span>
    </div>
  </div>

  <!-- ── TELA CRIAR LOJA ── -->
  <div id="telaCriarLoja" style="display:none;padding:20px 24px">

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px">
      <button class="btn-voltar" onclick="voltarLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div style="font-size:1.1rem;font-weight:800">Criar loja</div>
    </div>

    <!-- Preview de marca dinâmica -->
    <div class="marca-preview" id="marcaPreview">
      <div class="marca-preview-hero" id="marcaPreviewHero">
        <div class="marca-preview-logo" id="marcaPreviewLogo">R</div>
        <div>
          <div class="marca-preview-nome" id="marcaPreviewNome">Nome da loja</div>
          <div class="marca-preview-slogan" id="marcaPreviewSlogan">O teu slogan aqui</div>
        </div>
        <div class="marca-preview-tag" id="marcaPreviewEstilo">Moderno</div>
      </div>
    </div>

    <div class="campo">
      <label>Nome do negócio</label>
      <input id="criarNomeAn" type="text" placeholder="Ex: Mercearia Central" oninput="atualizarPreview()">
    </div>
    <div class="campo">
      <label>Slogan</label>
      <input id="criarSloganAn" type="text" placeholder="Ex: Tudo fresco, todo dia" oninput="atualizarPreview()">
    </div>
    <div class="campo">
      <label>Descrição</label>
      <input id="criarDescAn" type="text" placeholder="Breve descrição do negócio">
    </div>

    <div class="campo">
      <label>Categoria</label>
      <select id="criarCatAn" onchange="atualizarPreview()">
        <option value="geral">Geral</option>
        <option value="alimentacao">Alimentação</option>
        <option value="moda">Moda</option>
        <option value="tecnologia">Tecnologia</option>
        <option value="beleza">Beleza</option>
        <option value="servicos">Serviços</option>
        <option value="imoveis">Imóveis</option>
        <option value="saude">Saúde</option>
        <option value="educacao">Educação</option>
      </select>
    </div>

    <div class="campo">
      <label>Cor da marca</label>
      <div class="cor-picker-wrap" id="corPicker">
        <div class="cor-opt seleccionada" style="background:#8B0000" data-cor="#8B0000" onclick="selCor(this)"></div>
        <div class="cor-opt" style="background:#1a5276" data-cor="#1a5276" onclick="selCor(this)"></div>
        <div class="cor-opt" style="background:#145a32" data-cor="#145a32" onclick="selCor(this)"></div>
        <div class="cor-opt" style="background:#6c3483" data-cor="#6c3483" onclick="selCor(this)"></div>
        <div class="cor-opt" style="background:#b7950b" data-cor="#b7950b" onclick="selCor(this)"></div>
        <div class="cor-opt" style="background:#c0392b" data-cor="#c0392b" onclick="selCor(this)"></div>
        <div class="cor-opt" style="background:#1a1a1a" data-cor="#1a1a1a" onclick="selCor(this)"></div>
        <input type="color" id="corCustom" class="cor-custom" value="#8B0000" onchange="selCorCustom(this)" title="Cor personalizada">
      </div>
    </div>

    <div class="campo">
      <label>WhatsApp</label>
      <input id="criarWppAn" type="tel" placeholder="+244 9XX XXX XXX">
    </div>
    <div class="campo">
      <label>Telefone</label>
      <input id="criarTelAn" type="tel" placeholder="+244 9XX XXX XXX">
    </div>
    <div class="campo">
      <label>Localização</label>
      <input id="criarLocalAn" type="text" placeholder="Ex: Luanda, Kilamba">
    </div>

    <div class="campo">
      <label>Plano de publicidade</label>
      <select id="criarPlanoAn">
        <option value="semanal">Semanal — 500 KZ</option>
        <option value="quinzenal">Quinzenal — 900 KZ</option>
        <option value="mensal" selected>Mensal — 1.500 KZ</option>
      </select>
    </div>

    <button class="btn-primary w100" style="margin-top:4px" onclick="criarLoja()">Criar loja</button>
  </div>

  <!-- ── PAINEL LOJA ── -->
  <div id="painelLoja" style="display:none">

    <!-- Hero dinâmico com marca -->
    <div class="painel-hero" id="painelHero">
      <div class="painel-hero-bg" id="painelHeroBg"></div>
      <div class="painel-hero-pattern" id="painelHeroPattern"></div>
      <div class="painel-hero-content">
        <div class="painel-hero-top">
          <button class="btn-hero-back" onclick="sairLoja()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          </button>
          <div class="painel-logo" id="painelLogo"></div>
          <div class="painel-nome-wrap">
            <div class="painel-nome" id="painelNome"></div>
            <div class="painel-plano" id="painelPlano"></div>
          </div>
          <div id="painelEstado"></div>
        </div>
        <div class="painel-stats">
          <div class="painel-stat">
            <div class="painel-stat-num" id="anStatProdutos">0</div>
            <div class="painel-stat-label">Produtos</div>
          </div>
          <div class="painel-stat">
            <div class="painel-stat-num" id="anStatDias">0</div>
            <div class="painel-stat-label">Dias</div>
          </div>
          <div class="painel-stat">
            <div class="painel-stat-num" id="anStatVisitas">—</div>
            <div class="painel-stat-label">Visitas</div>
          </div>
        </div>
      </div>
    </div>

    <div class="an-tabs">
      <button class="an-tab activo" onclick="mostrarTabAn('visao')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:4px"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        Visão
      </button>
      <button class="an-tab" onclick="mostrarTabAn('produtos')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Produtos
      </button>
      <button class="an-tab" onclick="mostrarTabAn('config')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:4px"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 19.07a10 10 0 0 1 0-14.14"/></svg>
        Config
      </button>
    </div>

    <!-- TAB VISÃO GERAL -->
    <div class="an-secao activa" id="anTabVisao">

      <div class="an-card">
        <div class="an-card-titulo">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          Link da loja
        </div>
        <div class="link-loja">
          <div class="link-loja-url" id="linkLojaUrl"></div>
          <button class="btn-copiar" onclick="copiarLink()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copiar
          </button>
        </div>
        <button class="btn-outline w100" onclick="verLoja()" style="display:flex;align-items:center;justify-content:center;gap:7px">

            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            WhatsApp

          <button class="btn-outline" onclick="copiarLink()" style="display:flex;align-items:center;justify-content:center;gap:7px">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>

    <!-- TAB PRODUTOS -->
    <div class="an-secao" id="anTabProdutos">
      <div class="an-card">
        <div class="an-card-titulo">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Adicionar produto ou serviço
        </div>
        <div class="campo"><label>Nome</label><input id="novoProdNome" type="text" placeholder="------"></div>
        <div class="campo"><label>Preço</label><input id="novoProdPreco" type="number" placeholder="0.00"></div>
        <div class="campo"><label>Descrição (opcional)</label><input id="novoProdDesc" type="text" placeholder="Breve descrição"></div>
        <button class="btn-primary w100" onclick="adicionarProduto()" style="display:flex;align-items:center;justify-content:center;gap:7px">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>

        </div>
        <div class="campo"><label>Nome</label><input id="cfgNome" type="text" oninput="atualizarPainelNome()"></div>

        <div class="campo"><label>Descrição</label><input id="cfgDesc" type="text"></div>
        <div class="campo"><label>WhatsApp</label><input id="cfgWpp" type="tel"></div>
        <div class="campo"><label>Telefone</label><input id="cfgTel" type="tel"></div>
        <div class="campo"><label>Localização</label><input id="cfgLocal" type="text"></div>
        <div class="campo">
          <label>Cor da marca</label>
          <div class="cor-picker-wrap" id="corPickerCfg">
            <div class="cor-opt" style="background:#8B0000" data-cor="#8B0000" onclick="selCorCfg(this)"></div>
            <div class="cor-opt" style="background:#1a5276" data-cor="#1a5276" onclick="selCorCfg(this)"></div>
            <div class="cor-opt" style="background:#145a32" data-cor="#145a32" onclick="selCorCfg(this)"></div>
            <div class="cor-opt" style="background:#6c3483" data-cor="#6c3483" onclick="selCorCfg(this)"></div>
            <div class="cor-opt" style="background:#b7950b" data-cor="#b7950b" onclick="selCorCfg(this)"></div>
            <div class="cor-opt" style="background:#c0392b" data-cor="#c0392b" onclick="selCorCfg(this)"></div>
            <div class="cor-opt" style="background:#1a1a1a" data-cor="#1a1a1a" onclick="selCorCfg(this)"></div>
            <input type="color" id="corCustomCfg" class="cor-custom" value="#8B0000" onchange="selCorCustomCfg(this)">

        <button class="btn-primary w100" onclick="guardarConfig()" style="display:flex;align-items:center;justify-content:center;gap:7px">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Guardar alterações
        </button>

      <div class="an-card" style="border-color:var(--r);background:rgba(139,0,0,0.03)">
        <div class="an-card-titulo" style="color:var(--r)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Zona de perigo
        </div>
        <button class="btn-outline w100" style="color:var(--r);border-color:var(--r);display:flex;align-items:center;justify-content:center;gap:7px" onclick="eliminarLoja()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M8 6V4h8v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
          Eliminar loja
        </button>
      </div>
    </div>

  </div><!-- /painelLoja -->
</div>

<div id="toastAn"></div>
<script src="moeda.js"></script>

<script>
  const API_P2P = 'https://kixikila-p2p.vercel.app/';
  let _anuncio   = null;
  let _corSel    = '#8B0000';
  let _corSelCfg = '#8B0000';

  // ── SISTEMA DE MARCA ────────────────────────────────────────
  const ESTILOS_MARCA = [
    { id: 'elegante',     nome: 'Elegante',     font: "'Playfair Display', serif",      weight: '700', spacing: '0.5px',  transform: 'none',      sloganStyle: 'italic', logoRadius: '50%',  pattern: "radial-gradient(circle, rgba(255,255,255,1) 1px, transparent 1px)", patternSize: '24px 24px' },
    { id: 'moderno',      nome: 'Moderno',      font: "'Space Grotesk', sans-serif",    weight: '700', spacing: '-1px',   transform: 'none',      sloganStyle: 'normal', logoRadius: '16px', pattern: "linear-gradient(45deg,rgba(255,255,255,1) 1px,transparent 1px),linear-gradient(-45deg,rgba(255,255,255,1) 1px,transparent 1px)", patternSize: '20px 20px' },
    { id: 'arrojado',     nome: 'Arrojado',     font: "'Syne', sans-serif",             weight: '800', spacing: '-2px',   transform: 'none',      sloganStyle: 'normal', logoRadius: '8px',  pattern: "repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,1) 18px,rgba(255,255,255,1) 19px)", patternSize: '100% 100%' },
    { id: 'impacto',      nome: 'Impacto',      font: "'Bebas Neue', sans-serif",       weight: '400', spacing: '3px',    transform: 'uppercase', sloganStyle: 'normal', logoRadius: '4px',  pattern: "repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(255,255,255,1) 28px,rgba(255,255,255,1) 29px)", patternSize: '100% 100%' },
    { id: 'classico',     nome: 'Clássico',     font: "'Cormorant Garamond', serif",    weight: '600', spacing: '1px',    transform: 'none',      sloganStyle: 'italic', logoRadius: '50%',  pattern: "radial-gradient(ellipse,rgba(255,255,255,1) 1px,transparent 1px)", patternSize: '16px 16px' },
    { id: 'minimalista',  nome: 'Minimalista',  font: "'DM Sans', sans-serif",          weight: '500', spacing: '4px',    transform: 'uppercase', sloganStyle: 'normal', logoRadius: '0px',  pattern: 'none', patternSize: '0' },
  ];

  const AFINIDADES = {
    alimentacao: [2,3,1], moda: [0,4,5], tecnologia: [1,5,2],
    beleza: [0,4,5], servicos: [1,2,3], imoveis: [0,4,1],
    saude: [5,1,0], educacao: [4,0,1], geral: [1,2,3],
  };

  function gerarMarca(nome, categoria) {
    let hash = 0;
    for (let i = 0; i < (nome||'').length; i++) {
      hash = ((hash << 5) - hash) + nome.charCodeAt(i); hash |= 0;
    }
    const pool = AFINIDADES[categoria] || [0,1,2,3,4,5];
    return ESTILOS_MARCA[pool[Math.abs(hash) % pool.length]];
  }

  function aplicarMarcaCSS(marca, cor) {
    const root = document.documentElement;
    root.style.setProperty('--loja-cor',           cor);
    root.style.setProperty('--loja-font',          marca.font);
    root.style.setProperty('--loja-nome-weight',   marca.weight);
    root.style.setProperty('--loja-nome-spacing',  marca.spacing);
    root.style.setProperty('--loja-nome-transform',marca.transform);
    root.style.setProperty('--loja-logo-radius',   marca.logoRadius);
    root.style.setProperty('--loja-pattern',       marca.pattern);
    root.style.setProperty('--loja-pattern-size',  marca.patternSize);
  }

  // ── PREVIEW EM TEMPO REAL ───────────────────────────────────
  function atualizarPreview() {
    const nome     = document.getElementById('criarNomeAn').value.trim();
    const slogan   = document.getElementById('criarSloganAn').value.trim();
    const categoria = document.getElementById('criarCatAn').value;
    const preview  = document.getElementById('marcaPreview');

    if (!nome) { preview.style.display = 'none'; return; }
    preview.style.display = 'block';

    const marca = gerarMarca(nome, categoria);
    const cor   = _corSel;

    // Aplica no preview
    const hero = document.getElementById('marcaPreviewHero');
    hero.style.background = `linear-gradient(160deg, ${cor} 0%, ${escurecer(cor, 60)} 100%)`;

    const prevRoot = document.documentElement;
    prevRoot.style.setProperty('--prev-font',     marca.font);
    prevRoot.style.setProperty('--prev-weight',   marca.weight);
    prevRoot.style.setProperty('--prev-spacing',  marca.spacing);
    prevRoot.style.setProperty('--prev-transform',marca.transform);
    prevRoot.style.setProperty('--prev-slogan',   marca.sloganStyle);

    document.getElementById('marcaPreviewLogo').textContent   = nome[0].toUpperCase();
    document.getElementById('marcaPreviewLogo').style.fontFamily = marca.font;
    document.getElementById('marcaPreviewNome').textContent   = nome;
    document.getElementById('marcaPreviewSlogan').textContent = slogan || 'O teu slogan aqui';
    document.getElementById('marcaPreviewEstilo').textContent = marca.nome;
  }

  function atualizarPainelNome() {
    const nome = document.getElementById('cfgNome').value;
    if (nome) document.getElementById('painelNome').textContent = nome;
  }

  // ── UTILS ───────────────────────────────────────────────────
  function esc(t) {
    if (!t) return '';
    const d = document.createElement('div');
    d.textContent = String(t); return d.innerHTML;
  }

  function toast(msg) {
    const t = document.getElementById('toastAn');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }

  function formatarValor(v) {
    return new Intl.NumberFormat('pt-AO').format(v || 0);
  }

  function escurecer(hex, amount = 50) {
    try {
      const n = parseInt(hex.replace('#',''), 16);
      const r = Math.max(0, (n>>16) - amount);
      const g = Math.max(0, ((n>>8)&0xff) - amount);
      const b = Math.max(0, (n&0xff) - amount);
      return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
    } catch { return '#3a0000'; }
  }

  // ── COR ─────────────────────────────────────────────────────
  function selCor(el) {
    document.querySelectorAll('#corPicker .cor-opt').forEach(e => e.classList.remove('seleccionada'));
    el.classList.add('seleccionada');
    _corSel = el.dataset.cor;
    atualizarPreview();
  }

  function selCorCustom(input) {
    _corSel = input.value;
    document.querySelectorAll('#corPicker .cor-opt').forEach(e => e.classList.remove('seleccionada'));
    atualizarPreview();
  }

  function selCorCfg(el) {
    document.querySelectorAll('#corPickerCfg .cor-opt').forEach(e => e.classList.remove('seleccionada'));
    el.classList.add('seleccionada');
    _corSelCfg = el.dataset.cor;
  }

  function selCorCustomCfg(input) {
    _corSelCfg = input.value;
    document.querySelectorAll('#corPickerCfg .cor-opt').forEach(e => e.classList.remove('seleccionada'));
  }

  // ── NAVEGAÇÃO ────────────────────────────────────────────────
  function mostrarCriarLoja() {
    document.getElementById('telaLoginAn').style.display  = 'none';
    document.getElementById('telaCriarLoja').style.display = 'block';
  }

  function voltarLogin() {
    document.getElementById('telaLoginAn').style.display   = 'block';
    document.getElementById('telaCriarLoja').style.display = 'none';
  }

  function sairLoja() {
    _anuncio = null;
    document.getElementById('painelLoja').style.display   = 'none';
    document.getElementById('telaLoginAn').style.display  = 'block';
    document.getElementById('anCodigo').value   = '';
    document.getElementById('anTelefone').value = '';
  }

  function mostrarTabAn(tab) {
    document.querySelectorAll('.an-tab').forEach((b, i) => {
      b.classList.toggle('activo', ['visao','produtos','config'][i] === tab);
    });
    document.querySelectorAll('.an-secao').forEach(s => s.classList.remove('activa'));
    document.getElementById('anTab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('activa');
  }

  // ── LOGIN ────────────────────────────────────────────────────
  async function entrarLoja() {
    const codigo   = document.getElementById('anCodigo').value.trim().toUpperCase();
    const telefone = document.getElementById('anTelefone').value.trim().replace(/\s/g,'');
    if (!codigo || !telefone) { toast('Preenche todos os campos'); return; }
    try {
      const res  = await fetch(API_P2P + 'anuncios/' + codigo);
      const data = await res.json();
      if (!res.ok) { toast('Loja não encontrada'); return; }
      const telLimpo = telefone.replace(/\D/g,'');
      const wppLimpo = (data.whatsapp||'').replace(/\D/g,'');
      const telLoja  = (data.telefone||'').replace(/\D/g,'');
      if (telLimpo !== wppLimpo && telLimpo !== telLoja) {
        toast('Telefone não corresponde à loja'); return;
      }
      _anuncio = data;
      mostrarPainel(data);
    } catch(e) { toast('Erro ao aceder'); }
  }

  // ── CRIAR LOJA ───────────────────────────────────────────────
  async function criarLoja() {
    const nome   = document.getElementById('criarNomeAn').value.trim();
    const slogan = document.getElementById('criarSloganAn').value.trim();
    const desc   = document.getElementById('criarDescAn').value.trim();
    const cat    = document.getElementById('criarCatAn').value;
    const wpp    = document.getElementById('criarWppAn').value.trim();
    const tel    = document.getElementById('criarTelAn').value.trim();
    const local  = document.getElementById('criarLocalAn').value.trim();
    const plano  = document.getElementById('criarPlanoAn').value;
    if (!nome || !wpp) { toast('Nome e WhatsApp obrigatórios'); return; }
    try {
      const res = await fetch(API_P2P + 'anuncios/criar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, slogan, descricao: desc, categoria: cat, cor: _corSel, telefone: tel, whatsapp: wpp, localizacao: local, plano })
      });
      const data = await res.json();
      if (!res.ok) { toast(data.erro || 'Erro'); return; }
      _anuncio = data.anuncio;
      toast('Loja criada! Código: ' + data.codigo);
      document.getElementById('telaCriarLoja').style.display = 'none';
      mostrarPainel(data.anuncio);
    } catch(e) { toast('Erro ao criar: ' + e.message); }
  }

  // ── PAINEL ───────────────────────────────────────────────────
  function mostrarPainel(a) {
    document.getElementById('telaLoginAn').style.display   = 'none';
    document.getElementById('telaCriarLoja').style.display = 'none';
    document.getElementById('painelLoja').style.display    = 'block';

    const cor   = a.cor || '#8B0000';
    const marca = gerarMarca(a.nome || 'Loja', a.categoria || 'geral');

    // Aplica marca no painel
    aplicarMarcaCSS(marca, cor);

    document.getElementById('painelHeroBg').style.background =
      `linear-gradient(160deg, ${cor} 0%, ${escurecer(cor, 60)} 100%)`;
    document.getElementById('painelHeroPattern').style.backgroundImage = marca.pattern;
    document.getElementById('painelHeroPattern').style.backgroundSize  = marca.patternSize;

    document.getElementById('painelLogo').textContent = (a.nome?.[0] || 'R').toUpperCase();
    document.getElementById('painelLogo').style.fontFamily = marca.font;
    document.getElementById('painelNome').textContent = a.nome || '';
    document.getElementById('painelPlano').textContent = 'Plano ' + (a.plano || 'mensal');

    const expira  = new Date(a.expira_em);
    const agora   = new Date();
    const dias    = Math.max(0, Math.ceil((expira - agora) / 86400000));
    const activo  = dias > 0 && a.activo;
    const pct     = Math.min(100, Math.round((dias / (a.plano==='semanal'?7:a.plano==='quinzenal'?15:30)) * 100));

    document.getElementById('painelEstado').innerHTML = activo
      ? '<span class="estado-badge badge-activo"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>Activo</span>'
      : '<span class="estado-badge badge-expirado"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>Expirado</span>';

    document.getElementById('anStatProdutos').textContent = (a.produtos||[]).filter(p=>p.disponivel).length;
    document.getElementById('anStatDias').textContent     = dias;
    document.getElementById('anStatVisitas').textContent  = '—';

    const url = window.location.origin + '/loja.html?c=' + a.codigo;
    document.getElementById('linkLojaUrl').textContent = url;

    document.getElementById('anValidadeTexto').textContent = 'Expira ' + expira.toLocaleDateString('pt-PT');
    document.getElementById('anValidadeDias').textContent  = dias + ' dias restantes';
    document.getElementById('anValidadeDias').style.color  = dias < 3 ? 'var(--r)' : 'var(--green)';

    const barra = document.getElementById('anValidadeBarra');
    barra.style.width      = pct + '%';
    barra.style.background = dias < 3 ? 'var(--r)' : 'var(--green)';

    // Config
    document.getElementById('cfgNome').value   = a.nome || '';
    document.getElementById('cfgSlogan').value = a.slogan || '';
    document.getElementById('cfgDesc').value   = a.descricao || '';
    document.getElementById('cfgWpp').value    = a.whatsapp || '';
    document.getElementById('cfgTel').value    = a.telefone || '';
    document.getElementById('cfgLocal').value  = a.localizacao || '';
    _corSelCfg = a.cor || '#8B0000';
    document.getElementById('corCustomCfg').value = _corSelCfg;

    renderProdutosAn();
  }

  function renderProdutosAn() {
    const lista = document.getElementById('listaProdutosAn');
    const prods = _anuncio?.produtos || [];

    if (!prods.length) {
      lista.innerHTML = `
        <div style="padding:24px;text-align:center;color:var(--muted)">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 8px;display:block;opacity:.4"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <div style="font-size:.85rem">Sem produtos ainda.</div>
        </div>`;
      return;
    }

    lista.innerHTML = prods.map((p, i) => `
      <div class="produto-item">
        <div class="produto-item-icone">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        </div>
        <div class="produto-item-info">
          <div class="produto-item-nome">${esc(p.nome)}</div>
          <div class="produto-item-preco">${formatarMoeda(p.preco)}</div>
        <div class="produto-item-acoes">
          <button class="toggle-disponivel ${p.disponivel?'on':''}" onclick="toggleDisponivel(${i})" title="${p.disponivel?'Disponível':'Indisponível'}"></button>
          <button class="btn-remover" onclick="removerProduto(${i})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M8 6V4h8v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
          </button>
        </div>
      </div>`).join('');
  }

  // ── PRODUTOS ─────────────────────────────────────────────────
  async function adicionarProduto() {
    const nome  = document.getElementById('novoProdNome').value.trim();
    const preco = parseFloat(document.getElementById('novoProdPreco').value);
    const desc  = document.getElementById('novoProdDesc').value.trim();
    if (!nome || !preco) { toast('Nome e preço obrigatórios'); return; }
    try {
      const res = await fetch(API_P2P + 'anuncios/' + _anuncio.codigo + '/produto', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, preco, descricao: desc })
      });
      const data = await res.json();
      if (!res.ok) { toast(data.erro || 'Erro'); return; }
      _anuncio.produtos = _anuncio.produtos || [];
      _anuncio.produtos.push({ id: Date.now().toString(), nome, preco, descricao: desc, disponivel: true });
      document.getElementById('novoProdNome').value  = '';
      document.getElementById('novoProdPreco').value = '';
      document.getElementById('novoProdDesc').value  = '';
      document.getElementById('anStatProdutos').textContent = _anuncio.produtos.filter(p=>p.disponivel).length;
      toast('Produto adicionado!');
      renderProdutosAn();
    } catch(e) { toast('Erro: ' + e.message); }
  }

  async function toggleDisponivel(idx) {
    _anuncio.produtos[idx].disponivel = !_anuncio.produtos[idx].disponivel;
    await guardarAnuncio();
    renderProdutosAn();
  }

  async function removerProduto(idx) {
    _anuncio.produtos.splice(idx, 1);
    await guardarAnuncio();
    toast('Produto removido.');
    renderProdutosAn();
  }

  // ── CONFIG ────────────────────────────────────────────────────
  async function guardarConfig() {
    _anuncio.nome        = document.getElementById('cfgNome').value.trim();
    _anuncio.slogan      = document.getElementById('cfgSlogan').value.trim();
    _anuncio.descricao   = document.getElementById('cfgDesc').value.trim();
    _anuncio.whatsapp    = document.getElementById('cfgWpp').value.trim();
    _anuncio.telefone    = document.getElementById('cfgTel').value.trim();
    _anuncio.localizacao = document.getElementById('cfgLocal').value.trim();
    _anuncio.cor         = _corSelCfg;
    await guardarAnuncio();
    toast('Alterações guardadas!');
    mostrarPainel(_anuncio);
  }

  async function guardarAnuncio() {
    await fetch(API_P2P + 'anuncios/' + _anuncio.codigo + '/actualizar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(_anuncio)
    });
  }

  async function eliminarLoja() {
    if (!confirm('Eliminar a loja permanentemente? Esta acção não pode ser desfeita.')) return;
    toast('Função disponível em breve.');
  }

  // ── PARTILHAR ─────────────────────────────────────────────────
  function copiarLink() {
    const url = window.location.origin + '/loja.html?c=' + _anuncio?.codigo;
    navigator.clipboard?.writeText(url);
    toast('Link copiado!');
  }

  function verLoja() {
    window.open('loja.html?c=' + _anuncio?.codigo);
  }

  function partilharWhatsApp() {
    const url = window.location.origin + '/loja.html?c=' + _anuncio?.codigo;
    const msg = encodeURIComponent(`Visita a minha loja no RondaP2P:\n${_anuncio?.nome}\n${url}`);
    window.open(`https://wa.me/?text=${msg}`);
  }

  function renovarPlano() {
    const wpp = '+244921325366';
    const msg = encodeURIComponent(`Olá! Quero renovar o plano da minha loja.\nCódigo: ${_anuncio?.codigo}\nNome: ${_anuncio?.nome}`);
    window.open(`https://wa.me/${wpp}?text=${msg}`);
  }
</script>
</body>
</html>
