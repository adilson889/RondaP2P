<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RondaP2P</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <style>
    textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--bg3);
      color: var(--text);
      font-size: .9rem;
      font-family: var(--sans);
      outline: none;
      resize: none;
    }
    textarea:focus { border-color: var(--r); }
  </style>
</head>
<body>

<!-- SIDEBAR (PC) -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><span style="color:var(--r)">R</span>ondaP2P</div>
  <button class="sidebar-btn activo" id="sbFeed" onclick="mostrarTabMain('feed')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Descobrir
  </button>
  <button class="sidebar-btn" id="sbMeus" onclick="mostrarTabMain('meus')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
    Os meus grupos
  </button>
  <button class="sidebar-btn" onclick="abrirListaConversas()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Mensagens
  </button>
  <button class="sidebar-btn" onclick="fecharModal('modalPerfil');window.location.href='anuncios.html'">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Minha loja
  </button>
  <div class="sidebar-spacer"></div>
  <button class="sidebar-btn" onclick="abrirPerfil()">
    <div class="sidebar-avatar" id="sidebarAvatar"></div>
    <span id="sidebarNome">Perfil</span>
  </button>
</aside>

<!-- APP PRINCIPAL -->
<div id="paginaMain" class="pagina com-sidebar" style="display:none">
  <div class="tabs">
    <button class="tab activo" id="tabFeed" onclick="mostrarTabMain('feed')">Descobrir</button>
    <button class="tab" id="tabMeus" onclick="mostrarTabMain('meus')">Os meus</button>
  </div>
  <div class="pagina-scroll">
    <div id="conteudoFeed"><div id="feedLista"></div></div>
    <div id="conteudoMeus" style="display:none">
      <div id="meusLista"></div>
      <div id="meusVazio" class="vazio" style="display:none">
        <p>Ainda não tens grupos.</p>
        <button class="btn-outline" onclick="mostrarTabMain('feed')">Descobrir grupos</button>
      </div>
    </div>
  </div>
  <button class="fab" onclick="abrirCriar()">+</button>
  <nav class="bottom-nav">
    <button class="bottom-nav-btn activo" id="bnFeed" onclick="mostrarTabMain('feed')">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="bottom-nav-btn" id="bnMeus" onclick="mostrarTabMain('meus')">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
    </button>
    <button class="bottom-nav-btn" onclick="abrirCriar()">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    </button>
    <button class="bottom-nav-btn" onclick="abrirListaConversas()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="bottom-nav-btn" id="bnPerfil" onclick="abrirPerfil()">
      <div class="bottom-nav-avatar" id="bnAvatar"></div>
    </button>
  </nav>
</div>

<!-- APP (ver grupo) -->
<div id="paginaApp" class="pagina com-sidebar" style="display:none">
  <div class="top-bar" style="display:flex">
    <button class="btn-voltar" onclick="irParaMain()">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <span class="top-titulo" id="appNomeGrupo"></span>
    <span id="appPill" class="pill"></span>
  </div>
  <div class="pagina-scroll">
    <div class="grupo-card">
      <div class="grupo-valor" id="appValor"></div>
      <div class="grupo-meta" id="appMeta"></div>
      <div class="progresso-wrap"><div class="progresso-bar" id="appProgresso"></div></div>
      <div class="grupo-rodape"><span id="appPagamentos"></span><span id="appProximaRonda"></span></div>
    </div>
    <div class="tabs tabs-sm">
      <button class="tab activo" id="tabMembros" onclick="mostrarTabApp('membros')">Membros</button>
      <button class="tab" id="tabRodas" onclick="mostrarTabApp('rodas')">Rodas</button>
      <button class="tab" id="tabChat" onclick="abrirChat()">Chat</button>
    </div>
    <div id="conteudoMembros">
      <div id="listaMembros"></div>
      <div class="acoes-grupo">
        <button class="btn-primary" onclick="registarPagamento()">Confirmar pagamento</button>
        <button class="btn-outline" id="btnEncerrar" onclick="encerrarGrupo()" style="display:none">Encerrar grupo</button>
        <button class="btn-outline" onclick="sairDoGrupo()">Sair do grupo</button>
      </div>
    </div>
    <div id="conteudoRodas" style="display:none"><div id="listaRodas"></div></div>
  </div>
</div>

<!-- CHAT (tela cheia) -->
<div id="paginaChat" class="pagina com-sidebar" style="display:none">
  <div class="top-bar" style="display:flex">
    <button class="btn-voltar" onclick="irParaApp()">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div style="flex:1">
      <div class="top-titulo" id="chatNomeGrupo"></div>
      <div style="font-size:.75rem;color:var(--muted)" id="chatMembrosCount"></div>
    </div>
  </div>
  <div id="chatMensagens" class="chat-lista"></div>
  <div class="chat-input-wrap">
    <textarea id="chatInput" class="chat-textarea" placeholder="Mensagem..." rows="1" oninput="crescerTextarea(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviarMsg()}"></textarea>
    <button class="btn-enviar" onclick="enviarMsg()">&#10148;</button>
  </div>
</div>

<!-- MODAL CRIAR GRUPO -->
<div id="modalCriar" class="modal-overlay" style="display:none" onclick="fecharModalSeClicarFora(event,this)">
  <div class="modal">
    <h3>Criar grupo</h3>
    <div style="margin-bottom:16px">
      <div class="foto-picker" onclick="document.getElementById('inputFotoGrupo').click()">
        <div class="foto-picker-inner" id="fotoGrupoPicker"><span id="fotoGrupoLetra">+</span><img id="fotoGrupoImg" src="" style="display:none"></div>
        <span class="foto-picker-label">Foto do grupo (opcional)</span>
      </div>
      <input id="inputFotoGrupo" type="file" accept="image/*" style="display:none" onchange="previewFotoGrupo(event)">
    </div>
    <div class="campo"><label>Nome do grupo</label><input id="criarNome" type="text" placeholder="Ex: Grupo Família"></div>
    <div class="campo"><label>Descrição</label><textarea id="criarDescricao" rows="2" placeholder="Descreva o objetivo do grupo..."></textarea></div>
    <div class="campo"><label>Regras do grupo</label><textarea id="criarRegras" rows="2" placeholder="Ex: Pagar até dia 10 de cada mês..."></textarea></div>
    <div class="campo"><label>Valor por ronda (KZ)</label><input id="criarValor" type="number" placeholder="Ex: 50000"></div>
    <div class="campo"><label>Periodicidade</label><select id="criarPeriod"><option value="mensal">Mensal</option><option value="quinzenal">Quinzenal</option><option value="semanal">Semanal</option></select></div>
    <div class="campo"><label>Máx. membros</label><input id="criarMax" type="number" value="6" min="2" max="20"></div>
    <div class="campo"><label>Localização (opcional)</label><input id="criarLocalizacao" type="text" placeholder="Ex: Luanda, Kilamba"></div>
    <div class="modal-btns"><button class="btn-outline" onclick="fecharModal('modalCriar')">Cancelar</button><button class="btn-primary" onclick="criarGrupo()">Criar</button></div>
  </div>
</div>

<!-- MODAL PREVIEW GRUPO -->
<div id="modalPreviewGrupo" class="modal-overlay" style="display:none" onclick="fecharModalSeClicarFora(event,this)">
  <div class="modal" style="max-height:85dvh;overflow-y:auto">
    <h3 id="previewTitulo"></h3>
    <div id="previewFoto"></div>
    <div id="previewDescricao"></div>
    <div id="previewRegras"></div>
    <div id="previewLocalizacao"></div>
    <div style="margin:12px 0"><strong>Valor</strong><br><span id="previewValor"></span></div>
    <div class="progresso-wrap" style="margin:12px 0"><div class="progresso-bar" id="previewProgresso" style="width:0%"></div></div>
    <div style="display:flex;justify-content:space-between;margin:8px 0"><span>Membros: <span id="previewMembros"></span></span><span>Vagas: <span id="previewVagas"></span></span></div>
    <div style="margin:8px 0"><strong>Criador</strong><br><span id="previewCriador"></span></div>
    <div class="modal-btns" style="margin-top:16px"><button class="btn-outline" onclick="fecharModal('modalPreviewGrupo')">Fechar</button><button class="btn-primary" onclick="solicitarEntrada()">Solicitar entrada</button></div>
  </div>
</div>

<!-- MODAL ENTRAR GRUPO -->
<div id="modalEntrar" class="modal-overlay" style="display:none" onclick="fecharModalSeClicarFora(event,this)">
  <div class="modal"><h3>Entrar num grupo</h3>
    <div class="campo"><label>Código do grupo</label><input id="entrarCodigo" type="text" placeholder="Ex: ABC123" style="text-transform:uppercase"></div>
    <div class="modal-btns"><button class="btn-outline" onclick="fecharModal('modalEntrar')">Cancelar</button><button class="btn-primary" onclick="entrarGrupo()">Entrar</button></div>
  </div>
</div>





<!-- MODAL PERFIL -->
<div id="modalPerfil" class="modal-overlay" style="display:none" onclick="fecharModalSeClicarFora(event,this)">
  <div class="modal" style="padding:0;overflow:hidden;max-height:92dvh">
  
    <!-- CAPA + AVATAR -->
    <div style="background:linear-gradient(135deg,var(--r) 0%,#5a0000 100%);padding:28px 20px 48px;position:relative">
      <button onclick="fecharModal('modalPerfil')" style="position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
      <div style="display:flex;align-items:flex-end;gap:14px">
        <div style="position:relative;cursor:pointer" onclick="document.getElementById('inputFotoPerfil').click()">
          <div id="perfilAvatarModal" style="width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.2);border:3px solid rgba(255,255,255,0.6);color:#fff;font-size:1.8rem;font-weight:900;display:flex;align-items:center;justify-content:center;background-size:cover;background-position:center"></div>
          <div style="position:absolute;bottom:0;right:0;width:22px;height:22px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--r)">✏</div>
        </div>
        <div>
          <div id="perfilNomeModal" style="color:#fff;font-size:1.1rem;font-weight:800;line-height:1.2"></div>
          <div id="perfilTelModal" style="color:rgba(255,255,255,0.7);font-size:.8rem;margin-top:2px"></div>
          <div id="perfilLocalizacaoModal" style="color:rgba(255,255,255,0.6);font-size:.75rem;margin-top:2px"></div>
        </div>
      </div>
      <input id="inputFotoPerfil" type="file" accept="image/*" style="display:none" onchange="previewFotoPerfil(event)">
    </div>

    <!-- STATS -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-top:-1px">
      <div style="background:var(--bg2);padding:14px 12px;text-align:center">
        <div id="statGruposAtivos" style="font-size:1.4rem;font-weight:900;color:var(--r)">—</div>
        <div style="font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px">Grupos</div>
      </div>
      <div style="background:var(--bg2);padding:14px 12px;text-align:center;border-left:1px solid var(--border);border-right:1px solid var(--border)">
        <div id="statReputacao" style="font-size:1.4rem;font-weight:900;color:#FBBF24">—</div>
        <div style="font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px">Reputação</div>
      </div>
      <div style="background:var(--bg2);padding:14px 12px;text-align:center">
        <div id="statConcluidos" style="font-size:1.4rem;font-weight:900;color:var(--green)">—</div>
        <div style="font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px">Concluídos</div>
      </div>
    </div>
    
    
  <!-- NEGOCIOS -->
      <div style="background:var(--bg3);border-radius:14px;padding:16px;margin-bottom:16px">
        <div style="font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Negócios</div>
        <button class="btn-outline w100" onclick="fecharModal('modalPerfil');window.location.href='anuncios.html'" style="display:flex;align-items:center;justify-content:center;gap:8px;color:var(--r);border-color:var(--r)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Gerir a minha loja
        </button>
      </div>
  
    <!-- CONTEUDO SCROLLAVEL -->
    <div style="padding:20px;overflow-y:scroll;-webkit-overflow-scrolling:touch;max-height:55dvh">

    <!-- EDITAR PERFIL COLAPSAVEL -->
      <div style="background:var(--bg3);border-radius:14px;margin-bottom:16px;overflow:hidden">
        <button onclick="toggleEditarPerfil()" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:none;border:none;cursor:pointer;font-family:var(--sans)">
          <span style="font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Editar perfil</span>
          <span id="editarPerfilSeta" style="font-size:.75rem;color:var(--muted);transition:transform .2s">▼</span>
        </button>
        <div id="editarPerfilConteudo" style="display:none;padding:0 16px 16px">
          <div class="campo" style="margin-bottom:12px">
            <label>Nome</label>
            <input id="editNome" type="text">
          </div>
          <div class="campo" style="margin-bottom:12px">
            <label>Nova senha (opcional)</label>
            <input id="editSenha" type="password" placeholder="Deixa vazio para manter">
          </div>
          <button class="btn-primary w100" onclick="guardarPerfil()">Guardar alterações</button>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <button class="btn-outline" onclick="logout()" style="display:flex;align-items:center;justify-content:center;gap:8px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair
        </button>
        <button class="btn-outline" onclick="abrirListaConversas()" style="display:flex;align-items:center;justify-content:center;gap:8px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Mensagens
        </button>
      </div>

      <button class="btn-outline w100" style="color:var(--r);border-color:var(--r-soft);font-size:.85rem" onclick="confirmarEliminarConta()">Eliminar conta</button>
    </div>
  </div>
</div>

<!-- MODAL PERFIL MEMBRO -->
<div id="modalMembroPerfil" class="modal-overlay" style="display:none" onclick="fecharModalSeClicarFora(event,this)">
  <div class="modal" style="padding:0;overflow:hidden;max-height:92dvh">

    <div style="height:100px;background:linear-gradient(135deg,var(--r) 0%,#3a0000 100%);position:relative;flex-shrink:0">
      <button class="modal-fechar" onclick="fecharModal('modalMembroPerfil')">&#10005;</button>
    </div>

    <div style="padding:0 20px;position:relative;margin-top:-44px;margin-bottom:12px">
      <div id="membroFotoGrande" style="width:88px;height:88px;border-radius:50%;border:4px solid var(--bg2);background:var(--bg3);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:900;color:var(--r);box-shadow:0 4px 16px rgba(0,0,0,0.12)"></div>
    </div>

    <div style="padding:0 20px 20px;overflow-y:auto">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
        <div>
          <div id="membroPerfilNome" style="font-size:1.2rem;font-weight:900;line-height:1.2"></div>
          <div id="membroPerfilTel" style="font-size:.8rem;color:var(--muted);margin-top:3px"></div>
          <div id="membroLocalizacao" style="font-size:.78rem;color:var(--muted);margin-top:2px"></div>
        </div>
        <button id="btnMensagemMembro" onclick="enviarMensagemMembro()" style="background:var(--r-soft);border:1px solid var(--r);color:var(--r);border-radius:20px;padding:7px 14px;font-size:.8rem;font-weight:700;cursor:pointer;flex-shrink:0;font-family:var(--sans)">
          Mensagem
        </button>
      </div>

      <div style="background:var(--bg3);border-radius:16px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:16px">
        <div style="text-align:center;flex-shrink:0">
          <div id="membroScoreNum" style="font-size:2rem;font-weight:900;color:var(--r);line-height:1">—</div>
          <div style="font-size:.65rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px">Score</div>
        </div>
        <div style="flex:1">
          <div class="membro-stars" id="membroStars" style="margin-bottom:6px"></div>
          <div id="membroStarsCount" style="font-size:.78rem;color:var(--muted)"></div>
        </div>
      </div>

      <div id="membroInfoExtra" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px"></div>
      <button class="btn-primary w100" id="btnAvaliarMembro" onclick="abrirAvaliarMembro()" style="margin-bottom:10px">Avaliar membro</button>
    </div>
  </div>
</div>

<!-- MODAL AVALIAR MEMBRO -->
<div id="modalAvaliar" class="modal-overlay" style="display:none" onclick="fecharModalSeClicarFora(event,this)">
  <div class="modal"><h3>Avaliar <span id="avaliarNome"></span></h3>
    <div class="estrelas-input" id="estrelasInput"></div>
    <div class="campo" style="margin-top:12px"><label>Comentário (opcional)</label><input id="avaliarComentario" type="text" placeholder="Ex: Sempre pagou a tempo"></div>
    <div class="modal-btns"><button class="btn-outline" onclick="fecharModal('modalAvaliar')">Cancelar</button><button class="btn-primary" onclick="confirmarAvaliacao()">Enviar</button></div>
  </div>
</div>

<!-- MODAL PUBLICAR POST -->
<div id="modalPost" class="modal-overlay" style="display:none" onclick="fecharModalSeClicarFora(event,this)">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3>Nova publicação</h3>
      <button onclick="fecharModal('modalPost')" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <div class="campo"><textarea id="postTexto" rows="4" placeholder="Partilha uma dica, pergunta ou ideia sobre poupança..."></textarea></div>
    <div class="modal-btns"><button class="btn-outline" onclick="fecharModal('modalPost')">Cancelar</button><button class="btn-primary" onclick="criarPost()">Publicar</button></div>
  </div>
</div>

<!-- MODAL COMENTARIOS POST -->
<div id="modalComentariosPost" class="modal-overlay" style="display:none" onclick="fecharModalSeClicarFora(event,this)">
  <div class="modal" style="max-height:85dvh;display:flex;flex-direction:column">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 id="comentariosTituloPost">Comentários</h3>
      <button onclick="fecharModal('modalComentariosPost')" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <div id="comentariosListaPost" style="flex:1;overflow-y:auto;margin-bottom:16px"></div>
    <div style="display:flex;gap:8px;border-top:1px solid var(--border);padding-top:12px">
      <input id="comentarioTextoPost" type="text" placeholder="Escreve um comentário..." style="flex:1;padding:11px 14px;border:1px solid var(--border);border-radius:20px;background:var(--bg3);color:var(--text);font-size:.9rem;outline:none" onkeydown="if(event.key==='Enter')enviarComentarioPost()">
      <button class="btn-enviar" onclick="enviarComentarioPost()">&#10148;</button>
    </div>
  </div>
</div>

<!-- MODAL GENERICO -->
<div id="modal" class="modal-overlay" style="display:none" onclick="fecharModalSeClicarFora(event,this)">
  <div class="modal"><h3 id="modalTitulo"></h3><p id="modalMsg" style="color:var(--muted);font-size:.9rem;margin:8px 0 16px"></p><div class="modal-btns" id="modalBtns"></div></div>
</div>

<div id="toast" class="toast"></div>

<script src="api.js"></script>
<script src="app.js"></script>
<script>
var _paginaAtual = 'main';

function irPara(id) {
  document.querySelectorAll('.pagina').forEach(p => p.style.display = 'none');
  document.getElementById(id).style.display = 'flex';
}

function irParaMain() {
  pararSync();
  _paginaAtual = 'main';
  history.pushState({ pagina: 'main' }, '');
  irPara('paginaMain');
}

function irParaApp() {
  _paginaAtual = 'app';
  history.pushState({ pagina: 'app' }, '');
  irPara('paginaApp');
}

function irParaChat() {
  _paginaAtual = 'chat';
  history.pushState({ pagina: 'chat' }, '');
  irPara('paginaChat');
}

window.addEventListener('popstate', function(e) {
  const modaisAbertos = document.querySelectorAll('.modal-overlay[style*="flex"]');
  if (modaisAbertos.length > 0) {
    modaisAbertos.forEach(m => m.style.display = 'none');
    history.pushState({}, '');
    return;
  }
  if (_paginaAtual === 'chat') {
    irParaApp();
  } else if (_paginaAtual === 'app') {
    irParaMain();
  } else {
    window.location.href = 'login.html';
  }
});

(function verificarSessao() {
  try {
    const raw = localStorage.getItem('kx_sessao');
    if (!raw) { window.location.href = 'login.html'; return; }
    const dados = JSON.parse(raw);
    const perfil = dados.perfil || dados;
    if (dados.expira && Date.now() > dados.expira) {
      localStorage.removeItem('kx_sessao');
      window.location.href = 'login.html';
      return;
    }
    KixikilaManager.setSessao(perfil);

    const nome = perfil.nome || 'K';
    const foto = perfil.foto_perfil || '';
    const sa = document.getElementById('sidebarAvatar');
    const ba = document.getElementById('bnAvatar');
    const sn = document.getElementById('sidebarNome');
    if (foto) {
      if (sa) { sa.style.backgroundImage = `url(${foto})`; sa.textContent = ''; }
      if (ba) { ba.style.backgroundImage = `url(${foto})`; ba.textContent = ''; }
    } else {
      if (sa) sa.textContent = nome[0].toUpperCase();
      if (ba) ba.textContent = nome[0].toUpperCase();
    }
    if (sn) sn.textContent = nome;

    history.pushState({ pagina: 'main' }, '');
    irParaMain();
  } catch(e) { window.location.href = 'login.html'; }
})();

function mostrarTabMain(tab) {
  document.getElementById('sbFeed')?.classList.toggle('activo', tab === 'feed');
  document.getElementById('sbMeus')?.classList.toggle('activo', tab === 'meus');
  document.getElementById('bnFeed')?.classList.toggle('activo', tab === 'feed');
  document.getElementById('bnMeus')?.classList.toggle('activo', tab === 'meus');
  document.getElementById('tabFeed')?.classList.toggle('activo', tab === 'feed');
  document.getElementById('tabMeus')?.classList.toggle('activo', tab === 'meus');
  document.getElementById('conteudoFeed').style.display  = tab === 'feed' ? 'block' : 'none';
  document.getElementById('conteudoMeus').style.display  = tab === 'meus' ? 'block' : 'none';
  if (tab === 'feed') carregarFeed();
  if (tab === 'meus') carregarMeus();
}
function toggleEditarPerfil() {
  const c = document.getElementById('editarPerfilConteudo');
  const s = document.getElementById('editarPerfilSeta');
  const aberto = c.style.display !== 'none';
  c.style.display = aberto ? 'none' : 'block';
  s.style.transform = aberto ? '' : 'rotate(180deg)';
}

function abrirListaConversas() { window.location.href = 'p2p.html'; }
function fecharModalSeClicarFora(e, el) { if (e.target === el) el.style.display = 'none'; }
function fecharModal(id) { const el = document.getElementById(id); if (el) el.style.display = 'none'; }
</script>
</body>
</html>
